# ══════════════════════════════════════════════════════
#  Apache Reverse Proxy — mobil.lizaypirlanta.com
#  IT ekibine ver: /etc/apache2/sites-available/mobil-lizay.conf
# ══════════════════════════════════════════════════════

<VirtualHost *:80>
    ServerName mobil.lizaypirlanta.com

    ProxyPreserveHost On
    ProxyRequests    Off

    ProxyPass        / http://127.0.0.1:3001/
    ProxyPassReverse / http://127.0.0.1:3001/

    # WebSocket desteği
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/?(.*) ws://127.0.0.1:3001/$1 [P,L]

    # Log
    ErrorLog  /var/log/apache2/mobil-lizay-error.log
    CustomLog /var/log/apache2/mobil-lizay-access.log combined
</VirtualHost>

# HTTPS için (SSL sertifikası varsa):
# <VirtualHost *:443>
#     ServerName mobil.lizaypirlanta.com
#     SSLEngine on
#     SSLCertificateFile    /path/to/cert.pem
#     SSLCertificateKeyFile /path/to/key.pem
#     ProxyPreserveHost On
#     ProxyPass        / http://127.0.0.1:3001/
#     ProxyPassReverse / http://127.0.0.1:3001/
# </VirtualHost>
